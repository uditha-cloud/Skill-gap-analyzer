<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Gap Analyzer - Home</title>
    <link rel="stylesheet" href="Skill_gap_analyzer.CSS">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .home-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }

        .hero-section h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .hero-section p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content-section {
            padding: 40px 30px;
        }

        .content-section h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .feature-badges {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .feature-badge {
            background: #f0f0f0;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .login-prompt {
            text-align: center;
            margin-top: 20px;
        }

        .login-prompt a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-prompt a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <div class="hero-section">
            <h1>🎯 Skill Gap Analyzer</h1>
            <p>Analyze your skills • Identify gaps • Get personalized recommendations</p>
        </div>

        <div class="content-section">
            <h2>Enter Your Skills</h2>
            
            <form id="skillForm" onsubmit="return analyzeSkills()">
                <div class="form-group">
                    <label for="skill1">Skill 1:</label>
                    <input type="text" id="skill1" placeholder="e.g., HTML" value="HTML" required>
                    <div class="range-container">
                        <input type="range" id="level1" min="0" max="100" value="50">
                        <span class="range-value" id="level1Value">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="skill2">Skill 2:</label>
                    <input type="text" id="skill2" placeholder="e.g., CSS" value="CSS" required>
                    <div class="range-container">
                        <input type="range" id="level2" min="0" max="100" value="50">
                        <span class="range-value" id="level2Value">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="skill3">Skill 3:</label>
                    <input type="text" id="skill3" placeholder="e.g., JavaScript" value="JavaScript" required>
                    <div class="range-container">
                        <input type="range" id="level3" min="0" max="100" value="50">
                        <span class="range-value" id="level3Value">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="skill4">Skill 4:</label>
                    <input type="text" id="skill4" placeholder="e.g., Python" value="Python" required>
                    <div class="range-container">
                        <input type="range" id="level4" min="0" max="100" value="50">
                        <span class="range-value" id="level4Value">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="skill5">Skill 5:</label>
                    <input type="text" id="skill5" placeholder="e.g., React" value="React" required>
                    <div class="range-container">
                        <input type="range" id="level5" min="0" max="100" value="50">
                        <span class="range-value" id="level5Value">50%</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Analyze My Skills</button>
            </form>

            <div id="analysisResult" class="analysis-result" style="display: none;">
                <h3>Analysis Results</h3>
                <div id="resultContent"></div>
            </div>

            <div class="feature-badges">
                <span class="feature-badge">📊 Skill Analysis</span>
                <span class="feature-badge">🎯 Gap Detection</span>
                <span class="feature-badge">📚 Course Recommendations</span>
            </div>

            <div class="footer-links">
                <a href="#about">About</a>
                <a href="#features">Features</a>
                <a href="#contact">Contact</a>
            </div>

            <div class="login-prompt">
                <a href="login.html">🔐 Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            for(let i = 1; i <= 5; i++) {
                const slider = document.getElementById(`level${i}`);
                const value = document.getElementById(`level${i}Value`);
                
                slider.addEventListener('input', function() {
                    value.textContent = this.value + '%';
                });
            }
        });

        function analyzeSkills() {
            const skills = [];
            for(let i = 1; i <= 5; i++) {
                skills.push({
                    name: document.getElementById(`skill${i}`).value.trim(),
                    level: parseInt(document.getElementById(`level${i}`).value)
                });
            }

            // Validate
            for(let skill of skills) {
                if(skill.name === '') {
                    alert('Please fill in all skill names');
                    return false;
                }
            }

            const avgLevel = skills.reduce((sum, s) => sum + s.level, 0) / skills.length;
            const lowSkills = skills.filter(s => s.level < 60);

            let resultHTML = `
                <div style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <p><strong>Average Skill Level:</strong> 
                        <span style="color: ${avgLevel >= 70 ? '#27ae60' : (avgLevel >= 50 ? '#f39c12' : '#e74c3c')}; font-weight: bold;">
                            ${avgLevel.toFixed(1)}%
                        </span>
                    </p>
                </div>
            `;

            if(lowSkills.length > 0) {
                resultHTML += '<p><strong>Skills to Improve:</strong></p><ul>';
                lowSkills.forEach(s => {
                    resultHTML += `<li>${s.name} (${s.level}%)</li>`;
                });
                resultHTML += '</ul>';
            }

            resultHTML += '<p><strong>Recommended Courses:</strong></p><ul>';
            if(avgLevel < 50) {
                resultHTML += '<li>Web Development Bootcamp</li>';
                resultHTML += '<li>Programming Fundamentals</li>';
            } else {
                resultHTML += '<li>Advanced React & Node.js</li>';
                resultHTML += '<li>Data Structures & Algorithms</li>';
            }
            resultHTML += '<li>Git & GitHub Masterclass</li>';
            resultHTML += '</ul>';

            document.getElementById('resultContent').innerHTML = resultHTML;
            document.getElementById('analysisResult').style.display = 'block';
            
            return false;
        }
    </script>
</body>
</html>
